<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Goals — GoalTracker</title>
  <meta name="description" content="A premium, minimal personal goal management application managing life goals across Year, Quarter, Month, and Week horizons.">
  
  <!-- CSS Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/flatpickr.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="app-container">
    <!-- Header & Top Bar -->
    <header class="header">
      <div class="brand-section">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1 class="app-title">Personal Goals</h1>
        </div>
      </div>





      <div class="top-actions">
        <!-- Search Bar -->
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search goals or descriptions..." autocomplete="off">
        </div>

        <!-- 🏆 Achievements Filter Button -->
        <button id="btn-filter-achievements" class="btn-secondary achievement-btn" title="Filter Completed Achievements & Milestones (without strikethrough)">
          🏆
        </button>


        <!-- Show Level Hierarchy Depth Button (Icon Only, beside Add Program) -->
        <button id="btn-show-level" class="btn-secondary level-picker-btn" title="Expand hierarchy up to specific depth level (Program, Project, Milestone, Task)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
        </button>

        <!-- Add Top Level Program Button -->
        <button id="add-program-btn" class="btn-primary" title="Create a new 1-Year Program">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Program
        </button>


      </div>
    </header>

    <!-- View 1: Tree View Workspace -->
    <div id="view-tree" class="app-view active">
      <!-- Active To-Do & Summary Cards Row -->
      <div class="todo-dashboard-row">
        <!-- Active To-Do List Section -->
        <section class="todo-section">
          <div class="todo-card-box">
            <div class="todo-box-header">
              <div class="todo-box-title">
                <span class="todo-box-icon">⚡</span>
                <h2>Active To-Do List</h2>
              </div>
              <span id="todo-pending-count" class="todo-count-pill">0 Pending</span>
            </div>
            <div id="todo-pending-list" class="todo-task-list"></div>
          </div>
        </section>

        <!-- Vertical Summary Dashboard -->
        <div id="summary-dashboard" class="summary-dashboard vertical-dashboard"></div>
      </div>

      <main id="tree-container" class="tree-container"></main>
    </div>
  </div>




  <!-- Vendor Libraries -->

  <script src="{{ url_for('static', filename='vendor/Sortable.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/flatpickr.min.js') }}"></script>

  <!-- ES Module Application Code -->
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
