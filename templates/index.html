<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Goals — GoalTracker</title>
  <meta name="description" content="A premium, minimal personal goal management application managing life goals across Year, Quarter, Month, and Week horizons.">
  
  <!-- CSS Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/flatpickr.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="app-container">
    <!-- Header & Top Bar -->
    <header class="header">
      <div class="brand-section">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1 class="app-title">Personal Goals</h1>
        </div>
      </div>


      <div class="top-actions">
        <!-- Search Bar -->
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search goals or descriptions..." autocomplete="off">
        </div>

        <!-- Toggle Collapse/Expand All Button -->


        <button id="toggle-collapse-btn" class="btn-secondary" title="Expand or collapse all goals">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 14 10 14 10 20"></polyline>
            <polyline points="20 10 14 10 14 4"></polyline>
            <line x1="14" y1="10" x2="21" y2="3"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
          </svg>
        </button>

        <!-- Toggle Hide/Show Completed Button -->
        <button id="toggle-hide-completed-btn" class="btn-secondary" title="Hide or show completed goals">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>



        <!-- Add Top Level Program Button -->
        <button id="add-program-btn" class="btn-primary" title="Create a new 1-Year Program">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Program
        </button>

      </div>
    </header>

    <!-- Top Summary Dashboard Bar -->
    <div id="summary-dashboard" class="summary-dashboard"></div>

    <!-- Main Tree View Workspace -->
    <main id="tree-container" class="tree-container">

      <!-- Tree view dynamically rendered by tree.js -->
    </main>
  </div>

  <!-- Vendor Libraries -->

  <script src="{{ url_for('static', filename='vendor/Sortable.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/flatpickr.min.js') }}"></script>

  <!-- ES Module Application Code -->
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
