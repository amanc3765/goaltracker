<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Goals Tracker — Linear-Style Hierarchy Management</title>
  <meta name="description" content="A premium, minimal personal goal management application managing life goals across Year, Quarter, Month, and Week horizons.">
  
  <!-- CSS Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/flatpickr.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="app-container">
    <!-- Header & Top Bar -->
    <header class="header">
      <div class="brand-section">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1 class="app-title">Personal Goals</h1>
          <p class="app-subtitle">Program → Project → Milestone → Task</p>
        </div>
      </div>

      <div class="top-actions">
        <!-- Search Bar -->
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search goals or descriptions..." autocomplete="off">
          <span class="search-shortcut">⌘K</span>
        </div>

        <!-- Add Top Level Program Button -->
        <button id="add-program-btn" class="btn-primary" title="Create a new 1-Year Program">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          + Add Program
        </button>
      </div>
    </header>

    <!-- Main Tree View Workspace -->
    <main id="tree-container" class="tree-container">
      <!-- Tree view dynamically rendered by tree.js -->
    </main>

    <!-- Keyboard Shortcuts Hint Footer -->
    <footer class="keyboard-bar">
      <span class="key-hint"><span class="key-cap">⌘K</span> Search</span>
      <span class="key-hint"><span class="key-cap">N</span> New Program</span>
      <span class="key-hint"><span class="key-cap">↑</span><span class="key-cap">↓</span> Navigate</span>
      <span class="key-hint"><span class="key-cap">Space</span> Toggle Task</span>
      <span class="key-hint"><span class="key-cap">Click</span> Inline Edit</span>
      <span class="key-hint"><span class="key-cap">Del</span> Delete Goal</span>
    </footer>
  </div>

  <!-- Right Side Inspector Panel Overlay -->
  <div id="inspector-overlay" class="inspector-overlay">
    <div id="inspector-drawer" class="inspector-drawer">
      <div class="inspector-header">
        <div class="inspector-header-left">
          <h2 style="font-size: 15px; font-weight: 700;">Goal Inspector</h2>
        </div>
        <button class="inspector-close-btn" title="Close inspector">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="inspector-body">
        <!-- Rendered dynamically by inspector.js -->
      </div>
    </div>
  </div>

  <!-- Vendor Libraries -->
  <script src="{{ url_for('static', filename='vendor/Sortable.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/flatpickr.min.js') }}"></script>

  <!-- ES Module Application Code -->
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
